<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="pragma" content="no-cache"/>
  <meta http-equiv="content-type" content="no-cache, must-revalidate"/>
  <meta http-equiv="expires" content="Wed, 26 Feb 1997 08:21:57 GMT"/>
  <title>客户咨询</title>

  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/my.css">
  <link rel="stylesheet" href="css/nav.css">

  <style>
    [v-cloak] {
        display: none;
    }
    .other-div {
      /*border: 1px solid #ccc;*/
      background-color: #f8f8f8;

      display: inline-block;
      position: relative;
      border-radius: 8px;
      padding: 8px;
      box-sizing: border-box;
      margin-left: 10px; /* 给小尾巴留出空间 */
    }
    /* 使用伪元素 ::after 创建指向左边的小尾巴 */
    .other-div::after {
      content: "";
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-right: 8px solid #f8f8f8;
    }



    .me-div {
      /*border: 1px solid #ccc;*/
      background-color: #dcf8c6;
      padding: 8px;
      display: inline-block;
      position: relative;
      border-radius: 8px;
      padding: 8px;
      box-sizing: border-box;
      margin-right: 10px; /* 给小尾巴留出空间 */
    }
    /* 使用伪元素 ::after 创建小尾巴 */
    .me-div::after {
      content: "";
      position: absolute;
      right: -8px;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 8px solid #dcf8c6;
    }
  </style>
</head>
<body style="background-color: #f2dede">
<div id="wrapper" v-cloak>
  <!-- 头部开始 -->
  <div style="width: 100%; height: 60px; line-height: 60px; background-color: #f13897">
    <div class="container">
      <div class="col-md-6" style="text-align: left">
      <span v-if="!user.name">
                <a href="javascript:void(0)" @click="enterEndPage(3)" style="color: white; margin-right: 20px" >登录</a>
                <a href="/end/page/register.html" target="_blank" style="color: white">注册</a>
                </span>
      </div>
      <div class="col-md-6" style="color: yellow; text-align: right">
                <span v-if="user.name">
                    欢迎您，{{user.name}}
                    <a style="color: white" href="javascript:void(0)" @click="logout">退出</a>
                    <a v-if="isCollect" style="margin-left: 10px" href="collectInfo.html">收藏夹</a>
                </span>
      </div>
    </div>
    <hr>
  </div>
  <div class="container">
    <div style="width: 100%; height: 80px;border-bottom: 1px solid #ccc">
      <div class="col-md-3" style="height: 80px; display: flex; justify-content: left;align-items: center;
                     font-size: 30px;">
        <a style="color: hotpink;" href="/front/index.html">{{system.title}}</a>
      </div>
      <div class="col-md-9">
        <div class="row" style="height: 80px; line-height: 80px">
          <ul style="display: flex;">
            <li class="nav-item"><a href="index.html">首页</a></li>
            <li class="nav-item"><a href="advertiserInfo.html">公告信息</a></li>
            <li class="nav-item"><a href="messageInfo.html">美妆资讯分享</a></li>
            <li class="nav-item"><a href="cartInfo.html">购物车信息</a></li>
            <li class="nav-item"><a href="orderInfo.html">订单信息</a></li>
            <li class="nav-item"><a href="commentInfo.html">评价信息</a></li>
            <li class="nav-item"><a href="customerInquiry.html"  class="nav-item-active">客户咨询</a></li>
            <li class="nav-item"><a href="systemHelp.html">系统帮助</a></li>
            <li class="nav-item"><a href="javascript:void(0)" @click="personalPage">个人信息</a></li>
            <li class="nav-item"><a href="javascript:void(0)" @click="enterEndPage(1)">进入后台系统</a></li>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
  <!-- 头部结束 -->
  <div class="container"  style="margin-top: 20px">
    <div class="row">
      <div style="margin-bottom: 10px" class="col-md-12">
        <h4>你想咨询什么</h4>
      </div>
      <div class="col-md-12">
        <textarea id="message-text" style="resize:none; width: 100%"></textarea>
      </div>
      <div class="col-md-12" style="text-align: right;">
        <button class="btn btn-primary" @click="submitMessage">发送</button>
        <hr>
      </div>
    </div>
    <div class="row">
      <div style="background-color: white;">
        <div style="width: 100%; height: 50px; background-color: #f8eeee; line-height: 50px; margin: 30px 0">
          <span style="font-weight: bold; margin-left: 20px; font-size: 16px">咨询内容（{{totalMessage}}）</span>
        </div>
        <div id="comment-content" >
          <div v-for="item in messages">
            <div class="col-md-1" style="text-align: right;padding: 8px;">{{item.name}}</div>
            <div class="col-md-10">
              <div class="row" style="padding: 0 40px">
                <div class="col-md-9" style="text-align: justify;">
                  <div v-if="item.name === user.name" class="me-div">
                    {{ item.content }}
                  </div>
                  <div v-else class="other-div">
                    {{ item.content }}
                  </div>
                </div>
                <div class="col-md-3"></div>
                <div style="color: #888" v-for="child in item.children">
                  <div class="col-md-12" style="margin-top: 10px; "> </div>
                  <div class="col-md-9" style="text-align: right">
                    <div class="me-div">
                      {{child.content}}
                    </div>
                  </div>
                  <div class="col-md-3" style="padding: 8px;">{{child.name}}</div>
                </div>
<!--                <div class="col-md-12" style="margin-top: 10px">-->
<!--                  <input type="text" class="form-control" style="width: 75%; display: inline-block" v-model="item.replayText">-->
<!--                  <button class="btn btn-sm " @click="reply(item.id, item.replayText)">回复</button>-->
<!--                </div>-->


              </div>
            </div>
            <div class="col-md-12"><hr  style="margin: 5px 0"/></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/jquery-1.10.2.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/vue2.6.11/axios.js"></script>
<script src="js/vue2.6.11/vue.min.js"></script>
<script src="js/my.js"></script>

<script>
  Date.prototype.Format = function (fmt) { // author: meizz
      let o = {
          "M+": this.getMonth() + 1, // 月份
          "d+": this.getDate(), // 日
          "h+": this.getHours(), // 小时
          "m+": this.getMinutes(), // 分
          "s+": this.getSeconds(), // 秒
          "q+": Math.floor((this.getMonth() + 3) / 3), // 季度
          "S": this.getMilliseconds() // 毫秒
      };
      if (/(y+)/.test(fmt))
          fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
      for (var k in o)
          if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
      return fmt;
  };

  new Vue({
      el: '#wrapper',
      data: {
          messages: [],
          totalMessage: 0,
          isShow: false,
          user: {},
          system:{},
          isCollect: false
      },

      created: function() {
      this.system = JSON.parse(localStorage.getItem('system'));
          axios.get('/auth').then(res => {
              if (res.data.code === '0') {
                  this.user = res.data.data;
                  this.isShow = true;
              }
          });
          this.loadMessages(1);
      },

      methods: {
          loadMessages() {
            axios.get('/customerlnquiryInfo/page/'+this.user.name).then(res => {
              if (res.data.code === '0') {
                this.messages = res.data.data;
                this.totalMessage = this.messages.length;
              } else {
                alert(res.data.msg)
              }
            })
          },
          submitMessage() {
              let user = this.user;
              if (!user || !user.name) {
                  alert('请先登录');localStorage.setItem('level', 3);
                  this.loadMessages();
                  return;
              }
              let data = {};
              let content = data.content = $('#message-text').val();
              if (!content) {
                  alert('请输入内容');
                  return;
              }
              data.content = content;
              data.name = user.name;
              data.time = new Date().Format('yyyy-MM-dd hh:mm:ss');
              axios.post('/customerlnquiryInfo', data).then(res => {
                  $('#message-text').val('');
                  alert('留言成功');
                  this.loadMessages();
              })
          },
          reply(id, content) {
              let user = this.user;
              if (!user || !user.name) {
                  alert('请先登录');localStorage.setItem('level', 3);
                  this.loadMessages();
                  return;
              }
              if (!content) {
                  alert('请输入内容');
                  return;
              }
              let data = {content: content, name: user.name, time: new Date().Format('yyyy-MM-dd hh:mm:ss'), parentId: id};
              axios.post('/customerlnquiryInfo', data).then(res => {
                  $('#message-text').val('');
                  alert('回复成功');
                  this.loadMessages();
              })
          },
          logout() {
              axios.get("/logout").then(res => {
                  if(res.data.code === '0') {
                      location.href = '/front/index.html';
                  } else {
                      msg('error', res.data.msg);
                  }
              })
          }
      }
  })
</script>
</body>
</html>
