<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>类似微信聊天页面</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }

        /* 聊天列表区域 */
        #chat-list {
            width: 30%;
            border-right: 1px solid #ccc;
            overflow-y: auto;
            background-color: #f8f8f8;
        }

        .chat-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .chat-item:hover {
            background-color: #e9e9e9;
        }

        /* 聊天窗口区域 */
        #chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #chat-header {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            text-align: center;
            background-color: #f8f8f8;
        }

        #message-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .message {
            margin-bottom: 10px;
            display: flex;
        }

        .message.me {
            justify-content: flex-end;
        }

        .message-content {
            padding: 8px;
            border-radius: 5px;
            max-width: 70%;
        }

        .message.me .message-content {
            background-color: #dcf8c6;
        }

        .message.other .message-content {
            background-color: #fff;
            border: 1px solid #eee;
        }

        #input-container {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
        }

        #message-input {
            flex: 1;
            padding: 5px;
        }

        #send-button {
            margin-left: 10px;
            padding: 5px 10px;
        }
    </style>
</head>

<body>
<div id="app">
    <!-- 聊天列表 -->
    <div id="chat-list">
        <div class="chat-item" v-for="chat in chats" :key="chat.id" @click="selectChat(chat)">
            {{ chat.name }}
        </div>
    </div>
    <!-- 聊天窗口 -->
    <div id="chat-window">
        <!-- 聊天窗口头部 -->
        <div id="chat-header">
            {{ selectedChat ? selectedChat.name : '请选择聊天对象' }}
        </div>
        <!-- 消息列表 -->
        <div id="message-list">
            <div class="message" :class="{ me: message.isMe, other:!message.isMe }"
                 v-for="(message, index) in selectedChatMessages" :key="index">
                <div class="message-content">
                    {{ message.text }}
                </div>
            </div>
        </div>
        <!-- 输入框和发送按钮 -->
        <div id="input-container">
            <input type="text" id="message-input" v-model="newMessage" placeholder="输入消息">
            <button id="send-button" @click="sendMessage">发送</button>
        </div>
    </div>
</div>

<script>
    new Vue({
        el: '#app',
        data: {
            // 聊天列表数据
            chats: [
                { id: 1, name: '好友 A', messages: [] },
                { id: 2, name: '好友 B', messages: [] },
                { id: 3, name: '好友 C', messages: [] }
            ],
            // 当前选中的聊天对象
            selectedChat: null,
            // 当前选中聊天对象的消息列表
            selectedChatMessages: [],
            // 用户输入的新消息
            newMessage: ''
        },
        methods: {
            // 选择聊天对象
            selectChat(chat) {
                this.selectedChat = chat;
                this.selectedChatMessages = chat.messages;
            },
            // 发送消息
            sendMessage() {
                if (this.newMessage.trim() !== '' && this.selectedChat) {
                    const newMsg = { text: this.newMessage, isMe: true };
                    this.selectedChat.messages.push(newMsg);
                    this.selectedChatMessages = this.selectedChat.messages;
                    this.newMessage = '';
                }
            }
        }
    });
</script>
</body>

</html>
